<section id="contact" class="contact">
    <div class="container">
        <div class="section-header">
            <h2 class="section-title">聯絡我們</h2>
            <div class="title-underline"></div>
        </div>
        <div class="contact-content">
            <div class="contact-info">
                <div class="info-item">
                    <div class="info-icon">📍</div>
                    <div>
                        <h4>地址</h4>
                        <p>
                            <a href="https://www.google.com/maps/search/?api=1&query=%E5%8F%B0%E4%B8%AD%E5%B8%82%E9%BE%8D%E4%BA%95%E5%8D%80%E9%81%8A%E5%9C%92%E5%8D%97%E8%B7%AF361%E5%B7%B789%E8%99%9F" target="_blank" rel="noopener noreferrer">
                                台中市龍井區遊園南路361巷89號
                            </a>
                        </p>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon">📞</div>
                    <div>
                        <h4>電話</h4>
                        <p>
                            <a href="tel:0978811987">0978-811-987</a>
                        </p>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon">✉️</div>
                    <div>
                        <h4>信箱</h4>
                        <p>contact@example.com</p>
                    </div>
                </div>
            </div>
            <form class="contact-form" id="contact-form">
                <div class="form-group"><input type="text" id="name" placeholder="姓名" required></div>
                <div class="form-group"><input type="tel" id="phone" placeholder="電話" required></div>
                <div class="form-group"><input type="email" id="email" placeholder="電子信箱" required></div>
                <div class="form-group"><textarea id="message" rows="5" placeholder="需求內容" required></textarea></div>
                <button type="submit" class="submit-btn">送出</button>
            </form>
        </div>
    </div>
</section>
