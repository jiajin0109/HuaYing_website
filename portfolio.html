<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品欣賞 | 華營室內裝修</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="solid-nav" data-page="portfolio">
    <div id="site-header"></div>

    <section id="portfolio" class="portfolio">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title">作品欣賞</h2>
                <div class="title-underline"></div>
            </div>
            <div class="portfolio-filters" id="portfolio-filters">
                <p class="data-loading">資料載入中...</p>
            </div>
            <div class="portfolio-grid" id="portfolio-grid">
                <p class="data-loading">資料載入中...</p>
            </div>
        </div>
    </section>

    <section id="panorama" class="panorama">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title">360 全景導覽</h2>
                <div class="title-underline"></div>
            </div>
            <div class="panorama-viewer-card">
                <div class="panorama-scene-controls" id="panorama-scene-controls" aria-label="全景場景切換">
                    <p class="data-loading">資料載入中...</p>
                </div>
                <div id="panorama-viewer" aria-label="室內空間 360 全景展示"></div>
                <p class="panorama-note" id="panorama-note">可用滑鼠拖曳、滾輪縮放，點擊畫面內標記可跳轉房間。</p>
            </div>
        </div>
    </section>

    <div id="site-bottom"></div>

    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <script src="layout.js"></script>
</body>
</html>
